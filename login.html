<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Schedula</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="auth-page">
    <div class="auth-container">
        <a href="/" class="back-link">
            <i data-lucide="arrow-left" style="width: 18px;"></i>
            Back to Home
        </a>

        <div class="auth-branding">
            <div class="logo">
                <i data-lucide="activity"></i>
                <span>Schedula</span>
            </div>
        </div>

        <div class="role-selector">
            <div class="role-option active" data-role="patient">Patient</div>
            <div class="role-option" data-role="doctor">Doctor</div>
        </div>

        <div class="auth-header">
            <h2>Login</h2>
            <p>Enter your credentials to access your account</p>
        </div>

        <div class="demo-card">
            <div class="demo-card-title">
                <i data-lucide="sparkles" style="width: 16px;"></i>
                Demo Patient Account
            </div>
            <div class="demo-credentials">
                <div class="demo-credential-item">User: <b>patient@care.com</b></div>
                <div class="demo-credential-item">Pass: <b>demo123</b></div>
                <div class="demo-credential-item">OTP: <b>123456</b></div>
            </div>
        </div>

        <form id="login-form">
            <div class="form-group">
                <label for="identifier">Mobile / Email</label>
                <input type="text" id="identifier" class="form-control" placeholder="Enter your email or mobile"
                    required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <div class="input-wrapper">
                    <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                    <i data-lucide="eye" class="password-toggle" id="toggle-password"></i>
                </div>
            </div>

            <div class="form-extras">
                <label class="remember-me">
                    <input type="checkbox">
                    Remember Me
                </label>
                <a href="#" class="forgot-password">Forgot Password?</a>
            </div>

            <button type="submit" class="btn btn-primary btn-block">Login</button>
        </form>

        <div class="divider">Or login with</div>

        <div class="social-auth">
            <button class="btn-social">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path
                        d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                        fill="#4285F4" />
                    <path
                        d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                        fill="#34A853" />
                    <path
                        d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"
                        fill="#FBBC05" />
                    <path
                        d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 12-4.53z"
                        fill="#EA4335" />
                </svg>
                Continue with Google
            </button>
            <button class="btn-social">
                <i data-lucide="apple"></i>
                Continue with Apple
            </button>
        </div>

        <div class="auth-footer">
            Don't have an account? <a href="/signup">Sign Up</a>
        </div>
    </div>

    <script type="module" src="/main.js"></script>
    <script type="module" src="/auth.js"></script>
</body>

</html>
